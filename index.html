<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS AI | Lecture Support Dashboard</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* ඔයා එවපු CSS එකම මෙතැනට දාන්න (මම ඉඩ ඉතිරි කර ගැනීමට කෙටියෙන් තබමි) */
        :root {
            --sidebar-bg: #161b22;
            --main-bg: #0b0e14;
            --card-bg: #1c2128;
            --accent-blue: #1f6feb;
            --accent-red: #da3633;
            --text-white: #f0f6fc;
            --text-gray: #8b949e;
            --success-green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-white);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            border-right: 1px solid #30363d;
        }

        .sidebar-logo {
            width: 120px;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 10px rgba(31, 111, 235, 0.3));
        }

        .nav-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .nav-btn.stop {
            background: var(--accent-red);
        }

        .status-badge {
            margin-top: auto;
            text-align: center;
            padding: 15px;
            font-weight: 700;
            color: var(--success-green);
            background: rgba(16, 185, 129, 0.1);
            border-radius: 8px;
        }

        .main-content {
            flex: 1;
            display: flex;
            padding: 25px;
            gap: 20px;
        }

        .display-card {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-blue);
            border-radius: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .mic-active {
            color: var(--accent-red) !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .label-ko {
            font-size: 1.4rem;
            color: #58a6ff;
            margin-bottom: 20px;
            min-height: 1.5em;
            font-weight: 300;
        }

        .label-en {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.3;
            min-height: 1.5em;
            color: var(--text-white);
        }

        .log-panel {
            width: 380px;
            background-color: #0d1117;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid #30363d;
        }

        .log-box {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: var(--text-white);
            padding: 15px;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .export-btn {
            background: var(--success-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loader {
            display: none;
            font-size: 0.9rem;
            color: var(--accent-blue);
            margin-top: 20px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <img src="images/logo.png" class="sidebar-logo">
        <label style="font-size: 0.7rem; color: var(--text-gray); margin-bottom: 5px;">LECTURE SESSION TITLE</label>
        <input type="text" id="lecture-title"
            style="background:#0d1117; border:1px solid #30363d; color:white; padding:12px; border-radius:8px; margin-bottom:20px;"
            placeholder="e.g. Computer Science 101">

        <button class="nav-btn" id="start-btn" onclick="toggleRecognition()">
            <i class="fa-solid fa-microphone"></i> START LIVE MODE
        </button>

        <button class="nav-btn stop" onclick="stopEverything()">
            <i class="fa-solid fa-square"></i> STOP SESSION
        </button>

        <div class="status-badge" id="status-badge">● SYSTEM READY</div>
    </div>

    <div class="main-content">
        <div style="flex:3; display:flex; flex-direction:column; gap:20px;">
            <div class="display-card">
                <div id="mic-indicator" style="font-size: 3rem; color: #30363d; margin-bottom: 25px;">
                    <i class="fa-solid fa-microphone-lines"></i>
                </div>
                <div class="label-ko" id="label-ko">강의가 시작되기를 기다리는 중...</div>
                <div class="label-en" id="label-en">Waiting for the lecture to begin...</div>
                <div id="loader" class="loader">
                    <i class="fa-solid fa-arrows-rotate fa-spin"></i> SLS AI is translating...
                </div>
            </div>
        </div>

        <div class="log-panel">
            <h4 style="margin-bottom: 15px; color: var(--text-gray); font-size: 0.8rem; letter-spacing: 1px;">LIVE
                LECTURE NOTES (EN)</h4>
            <textarea class="log-box" id="log-box" readonly
                placeholder="Translated text will appear here..."></textarea>
            <button type="button" class="export-btn" onclick="alert('Saving to Firebase...')">
                <i class="fa-solid fa-cloud-arrow-up"></i> AUTO-SYNC ACTIVE
            </button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const HF_TOKEN = "Bearer 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"; // ඔබේ නව Token එක මෙතැනට
        const MODEL_URL = "https://api-inference.huggingface.co/models/sankalpa1998/final_ko_en_v2_model";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRunning = false;

        const labelKo = document.getElementById('label-ko');
        const labelEn = document.getElementById('label-en');
        const logBox = document.getElementById('log-box');
        const statusBadge = document.getElementById('status-badge');
        const micIndicator = document.getElementById('mic-indicator');
        const loader = document.getElementById('loader');

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ko-KR';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const finalTranscript = event.results[i][0].transcript;
                        labelKo.innerText = finalTranscript;
                        sendToTranslate(finalTranscript);
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                        labelKo.innerText = interimTranscript;
                    }
                }
            };

            recognition.onerror = (event) => { console.error("Speech Error:", event.error); };
            recognition.onend = () => { if (isRunning) recognition.start(); };
        }

        function toggleRecognition() {
            if (!isRunning) {
                recognition.start();
                isRunning = true;
                statusBadge.innerText = "● LIVE LISTENING";
                statusBadge.style.color = "#58a6ff";
                micIndicator.classList.add('mic-active');
                document.getElementById('start-btn').innerHTML = '<i class="fa-solid fa-pause"></i> LISTENING...';
            } else {
                stopEverything();
            }
        }

        function stopEverything() {
            isRunning = false;
            recognition.stop();
            statusBadge.innerText = "● SYSTEM READY";
            statusBadge.style.color = "#10b981";
            micIndicator.classList.remove('mic-active');
            document.getElementById('start-btn').innerHTML = '<i class="fa-solid fa-microphone"></i> START LIVE MODE';
        }

        async function sendToTranslate(text) {
    if (!text.trim()) return;
    loader.style.display = 'block';

    const HF_TOKEN = "Bearer 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"; // ඔබේ Token එක
    const MODEL_URL = "https://api-inference.huggingface.co/models/sankalpa1998/final_ko_en_v2_model";

    try {
        // වැදගත්: අපි Content-Type එක නොදමා යැවීමෙන් Preflight (OPTIONS) මඟහරිනවා
        const response = await fetch(MODEL_URL, {
            method: "POST",
            headers: { 
                "Authorization": HF_TOKEN
                // මෙතැනින් Content-Type ඉවත් කරන්න
            },
            body: JSON.stringify({ 
                inputs: text,
                options: { wait_for_model: true } 
            })
        });
        
        const result = await response.json();
        
        if (result && result[0] && result[0].generated_text) {
            const translation = result[0].generated_text;
            labelEn.innerText = translation;
            logBox.value += `[KO]: ${text}\n[EN]: ${translation}\n\n`;
            logBox.scrollTop = logBox.scrollHeight;
        } else if (result.error) {
             console.error("API Error:", result.error);
             // Model එක load වෙනවා නම් පොඩි වෙලාවක් ඉන්න කියන්න
             if(result.estimated_time) labelEn.innerText = "AI Engine is starting... (Estimated: " + Math.round(result.estimated_time) + "s)";
        }
    } catch (err) {
        console.error("AI Error:", err);
    } finally {
        loader.style.display = 'none';
    }
}
    </script>
</body>

</html>
