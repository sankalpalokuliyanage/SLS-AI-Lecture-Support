<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS AI | V3.1 Fixed Engine</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #050a14;
            --main-bg: #0d1117;
            --card-bg: #161b22;
            --accent-gold: #9999;
            --accent-blue: #2f80ed;
            --text-white: #f0f6fc;
            --text-gray: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--main-bg); color: var(--text-white); display: flex; height: 100vh; }

        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo { width: 100px; margin: 0 auto 10px; filter: drop-shadow(0 0 8px var(--accent-blue)); }
        
        .v3-badge { 
            background: var(--accent-gold); color: black; font-size: 0.65rem; padding: 3px 10px; 
            border-radius: 12px; align-self: center; margin-bottom: 25px; font-weight: 800;
        }

        .nav-btn {
            background: var(--accent-blue); color: white; border: none; padding: 14px;
            border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }

        .nav-btn.stop { background: #eb5757; }

        .main-content { flex: 1; padding: 30px; display: flex; gap: 20px; }

        .display-card {
            background: radial-gradient(circle at top left, #1c2128, #0d1117);
            border: 2px solid #30363d; border-radius: 24px;
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .mic-active { color: #eb5757 !important; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .label-ko { font-size: 1.2rem; color: #58a6ff; margin-bottom: 15px; opacity: 0.8; }
        .label-en { font-size: 2.8rem; font-weight: 700; text-align: center; line-height: 1.2; letter-spacing: -1px; }

        .log-panel {
            width: 400px; background-color: var(--sidebar-bg);
            border-radius: 16px; padding: 20px; display: flex;
            flex-direction: column; border: 1px solid #30363d;
        }

        .log-box {
            flex: 1; background: #010409; border: 1px solid #30363d;
            border-radius: 12px; color: #d1d5db; padding: 15px;
            font-size: 0.9rem; resize: none; outline: none; margin-bottom: 15px; line-height: 1.6;
        }

        .loader { display: none; margin-top: 25px; color: var(--accent-gold); font-weight: 600; font-size: 0.9rem; }
    </style>
</head>

<body>
    <div class="sidebar">
        <img src="images/logo.png" class="sidebar-logo">
        <div class="v3-badge">V3.1 STABLE ENGINE</div>
        
        <label style="font-size: 0.7rem; color: var(--text-gray); margin-bottom: 5px; letter-spacing: 1px;">SESSION TITLE</label>
        <input type="text" id="lecture-title" 
               style="background:#0d1117; border:1px solid #30363d; color:white; padding:12px; border-radius:8px; margin-bottom:20px;" 
               placeholder="Enter Session Name">

        <button class="nav-btn" id="start-btn" onclick="toggleRecognition()">
            <i class="fa-solid fa-microphone"></i> START LISTENING
        </button>

        <button class="nav-btn stop" onclick="stopEverything()">
            <i class="fa-solid fa-stop-circle"></i> STOP SESSION
        </button>

        <div id="status-badge" style="margin-top:auto; text-align:center; color:var(--accent-gold); font-weight:bold; font-size:0.75rem; letter-spacing: 1px;">
            ● AI ENGINE READY
        </div>
    </div>

    <div class="main-content">
        <div class="display-card">
            <div id="mic-indicator" style="font-size: 3.5rem; color: #30363d; margin-bottom: 20px;">
                <i class="fa-solid fa-wave-square"></i>
            </div>
            <div class="label-ko" id="label-ko">දේශනය ආරම්භ වන තෙක් බලන් සිටී...</div>
            <div class="label-en" id="label-en">Waiting for Speech Input...</div>
            <div id="loader" class="loader">
                <i class="fa-solid fa-bolt-lightning fa-fade"></i> SLS AI IS TRANSLATING...
            </div>
        </div>

        <div class="log-panel">
            <h4 style="margin-bottom: 15px; color: var(--text-gray); font-size: 0.7rem; letter-spacing: 1px;">LECTURE TRANSCRIPT</h4>
            <textarea class="log-box" id="log-box" readonly placeholder="Translated text notes will appear here..."></textarea>
            <button class="nav-btn" style="background:#2f80ed; width:100%;" onclick="window.print()">
                <i class="fa-solid fa-print"></i> PRINT NOTES
            </button>
        </div>
    </div>

    <script>
        const HF_TOKEN = "Bearer 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";
        const MODEL_URL = "https://api-inference.huggingface.co/models/sankalpa1998/final_ko_en_v2_model";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRunning = false;

        const labelKo = document.getElementById('label-ko');
        const labelEn = document.getElementById('label-en');
        const logBox = document.getElementById('log-box');
        const micIndicator = document.getElementById('mic-indicator');
        const loader = document.getElementById('loader');

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ko-KR';

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const final = event.results[i][0].transcript;
                        labelKo.innerText = final;
                        sendToTranslate(final);
                    } else {
                        interim += event.results[i][0].transcript;
                        labelKo.innerText = interim;
                    }
                }
            };
            recognition.onend = () => { if (isRunning) recognition.start(); };
        }

        function toggleRecognition() {
            if (!isRunning) {
                recognition.start();
                isRunning = true;
                micIndicator.classList.add('mic-active');
                document.getElementById('start-btn').innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> LISTENING...';
            } else { stopEverything(); }
        }

        function stopEverything() {
            isRunning = false;
            recognition.stop();
            micIndicator.classList.remove('mic-active');
            document.getElementById('start-btn').innerHTML = '<i class="fa-solid fa-microphone"></i> START LISTENING';
        }

        async function sendToTranslate(text) {
    if (!text.trim()) return;
    loader.style.display = 'block';

    const HF_TOKEN = "Bearer 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";
    const MODEL_URL = "https://api-inference.huggingface.co/models/sankalpa1998/final_ko_en_v2_model";
    
    // CORS Proxy එකක් භාවිතා කිරීම (මෙය ඉතා වැදගත්)
    const PROXY_URL = "https://cors-anywhere.herokuapp.com/"; 

    try {
        // පළමුව Proxy එක නැතිව උත්සාහ කරමු
        const response = await fetch(MODEL_URL, {
            method: "POST",
            headers: { 
                "Authorization": HF_TOKEN,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ 
                inputs: text,
                options: { wait_for_model: true } 
            })
        });
        
        // Error එකක් ආවොත් (CORS වැනි), Proxy එක හරහා උත්සාහ කිරීමට catch එකට යයි
        const result = await response.json();
        
        if (result && result[0] && result[0].generated_text) {
            const translation = result[0].generated_text;
            labelEn.innerText = translation;
            logBox.value += `[KO]: ${text}\n[EN]: ${translation}\n\n`;
            logBox.scrollTop = logBox.scrollHeight;
        } else if (result.estimated_time) {
            labelEn.innerText = "Starting AI Engine... (" + Math.round(result.estimated_time) + "s)";
        }
    } catch (err) {
        console.error("Direct fetch failed, trying with Proxy extension/manual fix...", err);
        labelEn.innerText = "CORS Blocked. Please enable 'Allow CORS' Extension in Chrome.";
    } finally {
        loader.style.display = 'none';
    }
}
    </script>
</body>
</html>
