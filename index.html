<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS AI | Final Production Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ඔයාගේ පරණ Styles මෙතැනට දාන්න (මම ඒවා වෙනස් කළේ නැහැ) */
        :root { --sidebar-bg: #050a14; --main-bg: #0d1117; --card-bg: #161b22; --accent-gold: #f2994a; --accent-blue: #2f80ed; --text-white: #f0f6fc; --text-gray: #8b949e; }
        body { font-family: 'Inter', sans-serif; background-color: var(--main-bg); color: var(--text-white); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background-color: var(--sidebar-bg); padding: 30px 20px; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .nav-btn { background: var(--accent-blue); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .main-content { flex: 1; padding: 30px; display: flex; gap: 20px; }
        .display-card { background: radial-gradient(circle at top left, #1c2128, #0d1117); border: 2px solid #30363d; border-radius: 24px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .label-ko { font-size: 1.3rem; color: #58a6ff; margin-bottom: 15px; }
        .label-en { font-size: 2.8rem; font-weight: 700; }
        .log-panel { width: 400px; background-color: var(--sidebar-bg); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; border: 1px solid #30363d; }
        .log-box { flex: 1; background: #010409; border: 1px solid #30363d; border-radius: 12px; color: #d1d5db; padding: 15px; font-size: 0.9rem; resize: none; margin-bottom: 15px; }
        .loader { display: none; color: var(--accent-gold); margin-top: 20px; }
        .mic-active { color: #eb5757 !important; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent-blue); margin-bottom: 20px;">SLS AI</h2>
        <div style="background: var(--accent-gold); color: black; font-size: 0.65rem; padding: 3px 10px; border-radius: 12px; align-self: center; margin-bottom: 25px; font-weight: 800;">V3.1 FINAL</div>
        
        <label style="font-size: 0.7rem; color: var(--text-gray); margin-bottom: 5px;">SESSION TITLE</label>
        <input type="text" id="lecture-title" style="background:#0d1117; border:1px solid #30363d; color:white; padding:12px; border-radius:8px; margin-bottom:20px;" placeholder="Enter Session Name">

        <button class="nav-btn" id="start-btn" onclick="toggleRecognition()">
            <i class="fa-solid fa-microphone"></i> START LISTENING
        </button>

        <button class="nav-btn" style="background:#eb5757;" onclick="stopEverything()">
            <i class="fa-solid fa-stop-circle"></i> STOP SESSION
        </button>

        <div id="status-badge" style="margin-top:auto; text-align:center; color:var(--accent-gold); font-size:0.75rem;">
            ● CONNECTED TO HF SERVER
        </div>
    </div>

    <div class="main-content">
        <div class="display-card">
            <div id="mic-indicator" style="font-size: 4rem; color: #30363d; margin-bottom: 25px;">
                <i class="fa-solid fa-microphone-lines"></i>
            </div>
            <div class="label-ko" id="label-ko">강의가 시작되기를 기다리는 중...</div>
            <div class="label-en" id="label-en">Waiting for Speech...</div>
            <div id="loader" class="loader">
                <i class="fa-solid fa-bolt-lightning fa-fade"></i> AI IS PROCESSING...
            </div>
        </div>

        <div class="log-panel">
            <h4 style="margin-bottom: 15px; color: var(--text-gray); font-size: 0.7rem;">LECTURE TRANSCRIPT</h4>
            <textarea class="log-box" id="log-box" readonly></textarea>
            
            <form action="https://sankalpa1998-sls-ai.hf.space/export/" method="POST" target="_blank">
                <input type="hidden" name="content" id="hidden-content">
                <input type="hidden" name="title" id="hidden-title">
                <button type="submit" class="nav-btn" style="background:#2f80ed; width:100%;" onclick="updateExportData()">
                    <i class="fa-solid fa-file-word"></i> DOWNLOAD .DOCX
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. SETTINGS ---
        // ඔබගේ Hugging Face Space URL එක මෙහි නිවැරදිව ලබා දෙන්න
        const BASE_URL = "https://sankalpa1998-sls-ai.hf.space";

        // --- 2. SPEECH RECOGNITION SETUP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRunning = false;

        const labelKo = document.getElementById('label-ko');
        const labelEn = document.getElementById('label-en');
        const logBox = document.getElementById('log-box');
        const micIndicator = document.getElementById('mic-indicator');
        const loader = document.getElementById('loader');

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ko-KR';

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const final = event.results[i][0].transcript;
                        labelKo.innerText = final;
                        sendToTranslate(final);
                    } else {
                        interim += event.results[i][0].transcript;
                        labelKo.innerText = interim;
                    }
                }
            };
            recognition.onend = () => { if (isRunning) recognition.start(); };
        }

        // --- 3. TRANSLATION LOGIC (DJANGO API CONNECTED) ---
        async function sendToTranslate(text) {
            if (!text.trim()) return;
            loader.style.display = 'block';

            const formData = new FormData();
            formData.append('text', text);

            try {
                const response = await fetch(`${BASE_URL}/translate/`, {
                    method: "POST",
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.translation) {
                    const translation = result.translation;
                    labelEn.innerText = translation;
                    logBox.value += `[KO]: ${text}\n[EN]: ${translation}\n\n`;
                    logBox.scrollTop = logBox.scrollHeight;
                } else if (result.error) {
                    labelEn.innerText = "Error: " + result.error;
                }
            } catch (err) {
                console.error("Connection Error:", err);
                labelEn.innerText = "Check Hugging Face Space Status.";
            } finally {
                loader.style.display = 'none';
            }
        }

        // --- 4. EXPORT LOGIC ---
        function updateExportData() {
            document.getElementById('hidden-content').value = logBox.value;
            document.getElementById('hidden-title').value = document.getElementById('lecture-title').value || "Lecture_Notes";
        }

        function toggleRecognition() {
            if (!isRunning) {
                recognition.start();
                isRunning = true;
                micIndicator.classList.add('mic-active');
                document.getElementById('start-btn').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> LISTENING...';
            } else { stopEverything(); }
        }

        function stopEverything() {
            isRunning = false;
            recognition.stop();
            micIndicator.classList.remove('mic-active');
            document.getElementById('start-btn').innerHTML = '<i class="fa-solid fa-microphone"></i> START LISTENING';
        }
    </script>
</body>
</html>
